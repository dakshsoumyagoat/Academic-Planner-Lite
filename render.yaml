services:
  - type: web
    name: jee-planner
    runtime: node
    plan: free
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      BASE_PATH=/ PORT=3000 pnpm --filter @workspace/jee-planner run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: jee-planner-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: jee-planner-db
    plan: free
    databaseName: jee_planner
    user: jee_planner
